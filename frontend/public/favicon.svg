<!-- viewBox is cropped to the artwork's bounding box (including stroke) rather
     than a round 0 0 64 64, so the figure fills the icon at 16px. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 4 54 54" width="64" height="64" role="img" aria-label="Crewmate">
  <!-- Backpack, drawn first so the body overlaps its right edge. -->
  <path
    d="M 21 27 L 15 27 C 11 27 9 30 9 34 L 9 39 C 9 43 11 46 15 46 L 21 46 Z"
    fill="#7A0C12" stroke="#0C0C0C" stroke-width="5" stroke-linejoin="round" paint-order="stroke"
  />
  <!-- Body: rounded head, straight sides, two stubby legs with an arched notch. -->
  <path
    d="M 20 26
       C 20 14 25 8 33 8
       C 41 8 46 14 46 26
       L 46 50
       C 46 52.5 44.5 54 42 54
       L 39 54
       C 36.5 54 35 52.5 35 50
       L 35 47
       C 35 45 33.5 44 32 44
       C 30.5 44 29 45 29 47
       L 29 50
       C 29 52.5 27.5 54 25 54
       L 24 54
       C 21.5 54 20 52.5 20 50
       Z"
    fill="#C51111" stroke="#0C0C0C" stroke-width="5" stroke-linejoin="round" paint-order="stroke"
  />
  <!-- Visor -->
  <rect
    x="29" y="16" width="18" height="13" rx="6.5"
    fill="#9BD5E8" stroke="#0C0C0C" stroke-width="5" stroke-linejoin="round" paint-order="stroke"
  />
  <!-- Specular highlight on the visor -->
  <rect x="33" y="19" width="7.5" height="3.6" rx="1.8" fill="#FFFFFF" transform="rotate(-8 36.75 20.8)" />
</svg>
