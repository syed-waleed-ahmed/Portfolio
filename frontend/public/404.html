<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a192f" />
    <meta name="robots" content="noindex" />
    <title>404 · Page Not Found · Syed Waleed Ahmed</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://syedwaleedahmed.me/" />
    <style>
      :root {
        color-scheme: dark;
      }
      /* Standalone page, so the faces are redeclared here rather than reusing
         the bundled CSS. Same file, same metric-matched fallback - see the
         Design section of the README. */
      @font-face {
        font-family: "NTR";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/ntr-latin-400.woff2") format("woff2");
      }
      @font-face {
        font-family: "NTR Fallback";
        font-style: normal;
        font-weight: 400;
        src: local("Segoe UI"), local("SF Pro Text"), local("Roboto"),
          local("Helvetica Neue"), local("Arial");
        size-adjust: 79.8%;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: "NTR", "NTR Fallback", system-ui, -apple-system, "Segoe UI", sans-serif;
        /* Flat navy, matching --bg-main on the main site. This file is
           standalone (no bundled CSS), so the palette is inlined by hand -
           keep it in step with :root in src/styles/base.css. */
        background: #0a192f;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .card {
        max-width: 480px;
        text-align: center;
      }
      .code {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.78rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #22d3ee;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 700;
        letter-spacing: 0.005em;
        line-height: 1.15;
        margin: 0 0 0.75rem;
        color: #f8fafc;
      }
      h1 span {
        background: linear-gradient(135deg, #6366f1 0%, #22d3ee 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        color: #94a3b8;
        line-height: 1.65;
        margin: 0 0 1.75rem;
      }
      /* Outlined, matching .hero-cta-primary on the main site. */
      a.cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.78rem 1.5rem;
        border-radius: 8px;
        border: 1px solid #22d3ee;
        background: transparent;
        color: #22d3ee;
        font-weight: 600;
        font-size: 0.9rem;
        text-decoration: none;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      a.cta:hover {
        transform: translateY(-2px);
        background: rgba(34, 211, 238, 0.09);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card">
        <div class="code">Error · 404</div>
        <h1>Page <span>Not Found</span></h1>
        <p>
          That URL doesn't exist on this site (or it used to and got moved).
          Head back to the homepage to keep browsing.
        </p>
        <a class="cta" href="/">&larr; Back to home</a>
      </div>
    </main>
  </body>
</html>
