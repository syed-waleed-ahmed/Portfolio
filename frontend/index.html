<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Color scheme + theme color -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a192f" />

    <!--
      Note: leftover service workers from the old vite-plugin-pwa build are
      cleaned up by /sw.js (a kill-switch SW that unregisters itself and wipes
      its caches on next visit). No inline cleanup script here, so the CSP can
      stay strict without an extra script hash.
    -->

    <!-- Primary title (Google snippet) -->
    <title>Syed Waleed Ahmed</title>

    <!-- Meta description (~155 chars sweet spot) -->
    <meta
      name="description"
      content="Syed Waleed Ahmed, AI Engineer building production-grade multi-agent systems, RAG pipelines, and LLM workflow automation. Master's student at the University of Bologna."
    />

    <!-- Author / language hints -->
    <meta name="author" content="Syed Waleed Ahmed" />
    <meta name="language" content="English" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Favicons / app icons -->
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://syedwaleedahmed.me/" />

    <!-- Backend connection hint (DNS + TCP + TLS warmed before contact form submit) -->
    <link rel="dns-prefetch" href="https://portfolio-backend-kmum.onrender.com" />
    <link rel="preconnect" href="https://portfolio-backend-kmum.onrender.com" crossorigin />

    <!-- Preload the body font: it's needed for the hero headline, and
         font-display:swap would otherwise flash the fallback first.
         crossorigin is required even same-origin - font fetches are CORS-mode. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/ntr-latin-400.woff2"
      crossorigin
    />

    <!-- LCP optimization: preload the hero portrait in its best format -->
    <link
      rel="preload"
      as="image"
      href="/images/Profile.avif"
      type="image/avif"
      fetchpriority="high"
    />

    <!-- ====== Open Graph ====== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Syed Waleed Ahmed · Portfolio" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Syed Waleed Ahmed · AI Engineer · Portfolio" />
    <meta
      property="og:description"
      content="AI Engineer specializing in multi-agent systems, RAG pipelines, and LLM workflow automation."
    />
    <meta property="og:url" content="https://syedwaleedahmed.me/" />
    <!-- Purpose-built 1200x630 card. The portrait alone is square, and every
         platform crops og:image to ~1.91:1 - which sliced it into a band. -->
    <meta property="og:image" content="https://syedwaleedahmed.me/images/og-card.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Syed Waleed Ahmed - AI Engineer. Multi-agent systems, RAG pipelines, and LLM workflow automation."
    />

    <!-- ====== Twitter / X card ====== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Syed Waleed Ahmed · AI Engineer · Portfolio" />
    <meta
      name="twitter:description"
      content="AI Engineer working on multi-agent systems, RAG pipelines, and LLM workflow automation."
    />
    <meta name="twitter:image" content="https://syedwaleedahmed.me/images/og-card.png" />
    <meta
      name="twitter:image:alt"
      content="Syed Waleed Ahmed - AI Engineer. Multi-agent systems, RAG pipelines, and LLM workflow automation."
    />

    <!-- ====== Structured data: Person ====== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "@id": "https://syedwaleedahmed.me/#person",
        "name": "Syed Waleed Ahmed",
        "url": "https://syedwaleedahmed.me/",
        "image": "https://syedwaleedahmed.me/images/Profile.webp",
        "jobTitle": "AI Engineer",
        "description": "AI Engineer building production-grade multi-agent systems, RAG pipelines, and LLM workflow automation.",
        "email": "mailto:syedwaleedahmed9@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Bologna",
          "addressCountry": "IT"
        },
        "alumniOf": [
          {
            "@type": "CollegeOrUniversity",
            "name": "University of Bologna",
            "sameAs": "https://www.unibo.it/"
          },
          {
            "@type": "CollegeOrUniversity",
            "name": "University of Twente",
            "sameAs": "https://www.utwente.nl/"
          },
          {
            "@type": "CollegeOrUniversity",
            "name": "NED University of Engineering and Technology",
            "sameAs": "https://www.neduet.edu.pk/"
          }
        ],
        "sameAs": [
          "https://www.linkedin.com/in/syed-waleed-ahmed/",
          "https://github.com/syed-waleed-ahmed",
          "https://leetcode.com/u/syed-waleed-ahmed/"
        ],
        "knowsAbout": [
          "Artificial Intelligence",
          "Machine Learning",
          "Large Language Models",
          "Retrieval-Augmented Generation",
          "Multi-Agent Systems",
          "LLM Orchestration",
          "Conversational AI",
          "Serverless Architecture",
          "MLOps",
          "Full-Stack AI Development"
        ],
        "knowsLanguage": ["English", "Italian", "Urdu"]
      }
    </script>

    <!-- ====== Structured data: WebSite ====== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "https://syedwaleedahmed.me/#website",
        "name": "Syed Waleed Ahmed · Portfolio",
        "url": "https://syedwaleedahmed.me/",
        "inLanguage": "en",
        "author": { "@id": "https://syedwaleedahmed.me/#person" },
        "publisher": {
          "@type": "Person",
          "name": "Syed Waleed Ahmed",
          "url": "https://syedwaleedahmed.me/"
        }
      }
    </script>

    <!-- ====== Structured data: ProfilePage (Google profile-page markup) ====== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfilePage",
        "@id": "https://syedwaleedahmed.me/#webpage",
        "url": "https://syedwaleedahmed.me/",
        "name": "Syed Waleed Ahmed · AI Engineer · Portfolio",
        "isPartOf": { "@id": "https://syedwaleedahmed.me/#website" },
        "about": { "@id": "https://syedwaleedahmed.me/#person" },
        "mainEntity": { "@id": "https://syedwaleedahmed.me/#person" },
        "inLanguage": "en",
        "dateModified": "2026-07-15"
      }
    </script>
  </head>

  <body>

    <script>
      (window.requestIdleCallback||setTimeout)(function(){var s=document.createElement('script');s.src='https://www.googletagmanager.com/gtag/js?id=G-E5YE59PWT0';s.async=true;document.head.appendChild(s);window.dataLayer=window.dataLayer||[];function g(){dataLayer.push(arguments)}window.gtag=g;g('js',new Date());g('config','G-E5YE59PWT0')});

    <!-- Static fallback for crawlers/clients without JS; React replaces #root on load. -->
    <noscript>
      <div style="max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; color: #e2e8f0; font-family: system-ui, sans-serif; line-height: 1.6;">
        <h1>Syed Waleed Ahmed · AI Engineer</h1>
        <p>
          AI Engineer building production-grade multi-agent systems, RAG
          pipelines, and LLM workflow automation. Master's student in Automation
          Engineering at the University of Bologna, with an Erasmus semester at
          the University of Twente.
        </p>
        <p>
          Sections:
          <a href="#about">About</a> ·
          <a href="#experience">Experience</a> ·
          <a href="#projects">Projects</a> ·
          <a href="#skills">Skills</a> ·
          <a href="#contact">Contact</a>
        </p>
        <p>
          Find me on
          <a href="https://www.linkedin.com/in/syed-waleed-ahmed/">LinkedIn</a>
          and
          <a href="https://github.com/syed-waleed-ahmed">GitHub</a>.
        </p>
        <p>This site is fully interactive with JavaScript enabled.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
