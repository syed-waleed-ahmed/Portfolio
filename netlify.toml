[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Force HTTPS + WWW in ONE hop (fixes network dependency tree)
[[redirects]]
  from = "https://syedwaleedahmed.me/*"
  to = "https://www.syedwaleedahmed.me/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://syedwaleedahmed.me/*"
  to = "https://www.syedwaleedahmed.me/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.syedwaleedahmed.me/*"
  to = "https://www.syedwaleedahmed.me/:splat"
  status = 301
  force = true

# Aggressive caching for static assets (huge Lighthouse win)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
