name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default; jobs opt in to more if they ever need it.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      # node-version-file, not a hardcoded number: .nvmrc is the single source
      # of truth for local, CI and Netlify, so they can't drift apart.
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # NODE_ENV=production is load-bearing: postcss.config.js gates PurgeCSS
      # on it, and without it the CSS ships with all of Bootstrap.
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Audit (production deps only, fail on high+)
        run: npm audit --omit=dev --audit-level=high

  backend:
    name: Backend (test + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test (also validates all modules import cleanly)
        run: npm test

      - name: Audit (production deps only, fail on high+)
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks scans full history, not just the tip

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
